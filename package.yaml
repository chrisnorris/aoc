# @format

name: aoc
version: 0.1.0.0
github: 'chrisnorris/aoc'
license: BSD3
author: 'Christopher Norris'
maintainer: 'me'
copyright: '2021 Christopher Norris'

extra-source-files:
    - README.md
    - ChangeLog.md

default-extensions:
    - BangPatterns
    - DuplicateRecordFields
    - FlexibleContexts
    - GADTs
    - GeneralizedNewtypeDeriving
    - InstanceSigs
    - LambdaCase
    - MultiWayIf
    - NamedFieldPuns
    - RankNTypes
    - RecordWildCards
    - ScopedTypeVariables
    - TypeApplications
    - TypeFamilies
    - TupleSections
    - UndecidableInstances
    - ViewPatterns

# Metadata used when publishing your package
# synopsis:            Short description of your package
# category:            Web

# To avoid duplicated efforts in documentation and dealing with the
# complications of embedding Haddock markup inside cabal files, it is
# common to point users to the README.md file.
description: Please see the README on GitHub at <https://github.com/chrisnorris/aoc#readme>

dependencies:
    - array
    - base >= 4.7 && < 5
    - data-clist
    - filepath
    - lens
    - parsec
    - regex-tdfa

library:
    source-dirs: src

executables:
    aoc-exe:
        main: Main.hs
        source-dirs: app/2020/
        ghc-options:
            - -threaded
            - -rtsopts
            - -with-rtsopts=-N
        dependencies:
            - aoc

tests:
    aoc-test:
        main: Spec.hs
        source-dirs: test
        ghc-options:
            - -threaded
            - -rtsopts
            - -with-rtsopts=-N
        dependencies:
            - aoc
